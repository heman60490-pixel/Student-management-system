<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Student List</h1>
    <a href="/student/add-student" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
      + Add Student
    </a>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
  

    {% for student in students_data %}

    <div class="bg-white rounded-2xl shadow-lg hover:shadow-xl transition">
      <h2 class="text-xl font-semibold mb-2">{{ student.name }}</h2>                  
      <p class="text-gray-600 mb-1">Email: {{ student.email }}</p>
      <p class="text-gray-600 mb-4">Phone: {{ student.phone_number }}</p>
      
     {% for att in attendance %}
     {% if att.student.id == student.id %}
    <p class="text-gray-600 mb-4">Attendance: {{ att.status }}</p>
     {% endif %}
     {% endfor %}


      <div class="flex gap-2">
        <a href="{% url 'update_student' student.id %}" class="bg-yellow-500 text-white px-3 py-2 rounded-lg text-sm hover:bg-yellow-600">Update</a>

        <a href="{% url 'delete_student' student.id %}" class="bg-red-500 text-white px-3 py-2 rounded-lg text-sm hover:bg-red-600">Delete
        </a>
      </div>
    </div>

    {% endfor %}


</body>
</html>
