<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Student</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Update Student</h2>

    <form action="#" method="POST" class="space-y-5">

        {% csrf_token %}

      <!-- Name -->
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-1">FullName</label>
        <input 
          type="text" 
          name="name"
          value="{{ student.name }}"
          class="w-full px-4 py-2 border rounded-lg focus:ring-blue-400" focus:ring-2 focus:outline-none
          required>
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-700 mb-1">Email</label>
        <input 
          type="email" 
          name="email"
          value="{{ student.email }}"
          class="w-full px-4 py-2 border rounded-lg focus:ring-blue-400" focus:ring-2 focus:outline-none
          required
        >
      </div>

      <!-- Phone -->
      <div class="mb-6">
        <label class="block text-gray-700 mb-1">Phone Number</label>
        <input 
          type="text" 
          name="phone_number"
          value="{{ student.phone_number }}"
          class="w-full px-4 py-2 border rounded-lg focus:ring-blue-400" focus:ring-2 focus:outline-none
          required
        >
      </div>

      <!-- Buttons -->
      <div class="flex justify-between items-center pt-4">

        <a href="index.html"
          class="text-gray-600hover:text-black font-medium">
          Back
        </a>
        

        </button>

        <button
          type="submit"
          class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition shadow-md font-medium">
          Update Student
      </button>
      </div>

    </form>

  </div>

</body>
</html>
